<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaifuGPT — Nagisa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet"
    />
      <link rel="stylesheet" href="/frontend/style.css"/>


  </head>
  <body>
    <!-- Loading screen -->
    <div class="loading-screen" id="loading">
      <div class="loading-title">古河渚</div>
      <div class="loading-sub">Loading model…</div>
      <div class="loading-bar">
        <div class="loading-fill" id="loading-fill"></div>
      </div>
    </div>

    <div class="petals-bg"></div>

    <div class="app">
      <!-- Left: Live2D stage -->
      <div class="stage">
        <canvas id="live2d-canvas"></canvas>
        <div class="emotion-badge" id="emotion-badge">neutral</div>
      </div>

      <!-- Right: Chat panel -->
      <div class="panel">
        <div class="panel-header">
          <h1>渚 · Nagisa</h1>
          <div class="subtitle">Your waifu companion — ダーリンのために</div>
        </div>

        <div class="messages" id="messages">
          <div class="msg bot">
            <div class="msg-bubble">おかえり、ダーリン！今日はどうだった？</div>
            <div class="msg-ja">Welcome home, darling! How was your day?</div>
          </div>
        </div>

        <div class="typing" id="typing">
          <span></span><span></span><span></span>
        </div>

        <div class="audio-bar" id="audio-bar">
          <div class="audio-wave">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <span>Nagisa is speaking…</span>
        </div>

        <div class="image-preview" id="image-preview">
          <img id="preview-img" src="" alt="preview" />
          <button class="image-preview-remove" id="preview-remove">
            ✕ remove
          </button>
        </div>

        <div class="input-area">
          <div class="input-row">
            <button class="btn btn-img" id="img-btn" title="Upload image">
              🖼️
            </button>
            <textarea
              class="text-input"
              id="text-input"
              placeholder="Talk to Nagisa…"
              rows="1"
            ></textarea>
            <button class="btn btn-send" id="send-btn">➤</button>
          </div>
          <button class="btn btn-reset" id="reset-btn">
            Reset conversation
          </button>
        </div>

        <input type="file" id="file-input" accept="image/*" />
      </div>
    </div>

    <audio id="tts-audio" style="display: none"></audio>

    <!-- Name Capture Modal -->
<div id="name-modal" class="name-modal hidden">
  <div class="name-modal-box">
    <div class="name-modal-title">渚 · Nagisa</div>
    <div class="name-modal-sub">What should Nagisa call you, darling~?</div>
    <input
      id="name-input"
      class="name-modal-input"
      type="text"
      placeholder="Your name..."
      maxlength="32"
      autocomplete="off"
    />
    <button id="name-submit" class="name-modal-btn">Tell Nagisa ♡</button>
  </div>
</div>
    <!-- Remove ALL existing script tags and replace with these -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@5.3.12/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.3.1/dist/cubism4.min.js"></script>
   <script src="/frontend/script.js"></script>
  </body>
</html>

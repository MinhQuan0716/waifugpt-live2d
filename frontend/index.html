<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaifuGPT — Nagisa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --sakura: #f2b8c6;
        --sakura-dk: #d9829a;
        --cream: #fdf6f0;
        --ink: #1a1014;
        --ink-light: #5c3d4a;
        --panel: rgba(253, 246, 240, 0.82);
        --border: rgba(242, 184, 198, 0.45);
        --shadow: 0 8px 32px rgba(90, 30, 50, 0.12);
      }

      html,
      body {
        height: 100%;
        background: var(--cream);
        color: var(--ink);
        font-family: "DM Sans", sans-serif;
        overflow: hidden;
      }
      #live2d-canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      /* ── noise grain overlay ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
      }

      /* ── petal background ── */
      .petals-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 70% 60% at 20% 80%,
            rgba(242, 184, 198, 0.18) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 50% 40% at 80% 10%,
            rgba(242, 184, 198, 0.12) 0%,
            transparent 60%
          ),
          linear-gradient(160deg, #fdf0f4 0%, #fdf6f0 50%, #fef9f5 100%);
        pointer-events: none;
      }

      /* ── layout ── */
      .app {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 1fr 400px;
        height: 100vh;
        gap: 0;
      }

      /* ── left: model stage ── */
      .stage {
        background: transparent;
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        overflow: hidden;
      }

      #live2d-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .emotion-badge {
        position: absolute;
        top: 24px;
        left: 24px;
        background: var(--panel);
        border: 1px solid var(--border);
        backdrop-filter: blur(12px);
        border-radius: 100px;
        padding: 6px 16px;
        font-size: 12px;
        font-weight: 300;
        letter-spacing: 0.08em;
        color: var(--ink-light);
        text-transform: uppercase;
        transition: all 0.4s ease;
      }

      /* ── right: chat panel ── */
      .panel {
        background: var(--panel);
        backdrop-filter: blur(20px);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        box-shadow: -4px 0 40px rgba(90, 30, 50, 0.06);
        overflow: hidden; /* ← add this */
        min-height: 0; /* ← add this, fixes flex overflow */
      }

      .panel-header {
        padding: 28px 28px 20px;
        border-bottom: 1px solid var(--border);
      }

      .panel-header h1 {
        font-family: "Shippori Mincho", serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--ink);
      }

      .panel-header .subtitle {
        font-size: 12px;
        color: var(--ink-light);
        font-weight: 300;
        margin-top: 2px;
        letter-spacing: 0.06em;
      }

      /* ── messages ── */
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        scroll-behavior: smooth;
        min-height: 0; /* ← add this */
      }

      .messages::-webkit-scrollbar {
        width: 4px;
      }
      .messages::-webkit-scrollbar-track {
        background: transparent;
      }
      .messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      .msg {
        max-width: 88%;
        animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .msg.user {
        align-self: flex-end;
      }
      .msg.bot {
        align-self: flex-start;
      }

      .msg-bubble {
        padding: 10px 15px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.55;
        font-weight: 300;
      }

      .msg.user .msg-bubble {
        background: var(--sakura-dk);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .msg.bot .msg-bubble {
        background: white;
        border: 1px solid var(--border);
        color: var(--ink);
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(90, 30, 50, 0.06);
      }

      .msg-ja {
        font-family: "Shippori Mincho", serif;
        font-size: 11px;
        color: var(--ink-light);
        margin-top: 6px;
        padding: 0 4px;
        opacity: 0.7;
        line-height: 1.6;
      }

      /* ── typing indicator ── */
      .typing {
        align-self: flex-start;
        display: none;
        gap: 5px;
        padding: 12px 16px;
        background: white;
        border: 1px solid var(--border);
        border-radius: 18px;
        border-bottom-left-radius: 4px;
      }

      .typing.visible {
        display: flex;
      }

      .typing span {
        width: 6px;
        height: 6px;
        background: var(--sakura-dk);
        border-radius: 50%;
        animation: bounce 1.2s infinite;
        opacity: 0.5;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.5;
        }
        30% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      /* ── image preview ── */
      .image-preview {
        padding: 0 24px 8px;
        display: none;
        align-items: center;
        gap: 8px;
        max-height: 90px;
        overflow: hidden;
      }

      .image-preview.visible {
        display: flex; /* ← change from block to flex */
      }

      .image-preview img {
        max-height: 60px; /* ← reduce from 80px */
        max-width: 80px; /* ← add max-width */
        border-radius: 8px;
        border: 1px solid var(--border);
        object-fit: cover; /* ← add this */
        flex-shrink: 0;
      }

      .image-preview-remove {
        background: none;
        border: none;
        color: var(--ink-light);
        cursor: pointer;
        font-size: 12px;
        flex-shrink: 0;
      }

      /* ── input area ── */
      .input-area {
        padding: 16px 24px 24px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .input-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }

      .text-input {
        flex: 1;
        resize: none;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 16px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 300;
        color: var(--ink);
        background: white;
        outline: none;
        max-height: 100px;
        min-height: 46px;
        transition: border-color 0.2s;
        line-height: 1.5;
      }

      .text-input:focus {
        border-color: var(--sakura-dk);
      }
      .text-input::placeholder {
        color: #c4a0ae;
      }

      .btn {
        border: none;
        cursor: pointer;
        border-radius: 12px;
        font-family: "DM Sans", sans-serif;
        font-weight: 400;
        transition: all 0.2s;
      }

      .btn-send {
        background: var(--sakura-dk);
        color: white;
        width: 46px;
        height: 46px;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .btn-send:hover {
        background: #c4697f;
        transform: scale(1.05);
      }
      .btn-send:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .btn-img {
        background: white;
        border: 1px solid var(--border);
        color: var(--ink-light);
        width: 46px;
        height: 46px;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .btn-img:hover {
        border-color: var(--sakura-dk);
        color: var(--sakura-dk);
      }

      .btn-reset {
        background: transparent;
        color: var(--ink-light);
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 4px 8px;
        opacity: 0.6;
        align-self: flex-end;
      }

      .btn-reset:hover {
        opacity: 1;
        color: var(--sakura-dk);
      }

      #file-input {
        display: none;
      }

      /* ── audio bar ── */
      .audio-bar {
        display: none;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: white;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 12px;
        color: var(--ink-light);
      }

      .audio-bar.visible {
        display: flex;
      }

      .audio-wave {
        display: flex;
        gap: 2px;
        align-items: center;
        height: 16px;
      }

      .audio-wave span {
        width: 3px;
        background: var(--sakura-dk);
        border-radius: 2px;
        animation: wave 1s ease-in-out infinite;
      }

      .audio-wave span:nth-child(1) {
        animation-delay: 0s;
        height: 6px;
      }
      .audio-wave span:nth-child(2) {
        animation-delay: 0.1s;
        height: 12px;
      }
      .audio-wave span:nth-child(3) {
        animation-delay: 0.2s;
        height: 8px;
      }
      .audio-wave span:nth-child(4) {
        animation-delay: 0.3s;
        height: 14px;
      }
      .audio-wave span:nth-child(5) {
        animation-delay: 0.4s;
        height: 6px;
      }

      @keyframes wave {
        0%,
        100% {
          transform: scaleY(1);
        }
        50% {
          transform: scaleY(1.8);
        }
      }

      /* ── loading screen ── */
      .loading-screen {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: var(--cream);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        transition: opacity 0.6s ease;
      }

      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-title {
        font-family: "Shippori Mincho", serif;
        font-size: 28px;
        color: var(--ink);
      }

      .loading-sub {
        font-size: 13px;
        color: var(--ink-light);
        font-weight: 300;
      }

      .loading-bar {
        width: 200px;
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }

      .loading-fill {
        height: 100%;
        background: var(--sakura-dk);
        border-radius: 2px;
        width: 0%;
        transition: width 0.3s ease;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div class="loading-screen" id="loading">
      <div class="loading-title">古河渚</div>
      <div class="loading-sub">Loading model…</div>
      <div class="loading-bar">
        <div class="loading-fill" id="loading-fill"></div>
      </div>
    </div>

    <div class="petals-bg"></div>

    <div class="app">
      <!-- Left: Live2D stage -->
      <div class="stage">
        <canvas id="live2d-canvas"></canvas>
        <div class="emotion-badge" id="emotion-badge">neutral</div>
      </div>

      <!-- Right: Chat panel -->
      <div class="panel">
        <div class="panel-header">
          <h1>渚 · Nagisa</h1>
          <div class="subtitle">Your waifu companion — ダーリンのために</div>
        </div>

        <div class="messages" id="messages">
          <div class="msg bot">
            <div class="msg-bubble">おかえり、ダーリン！今日はどうだった？</div>
            <div class="msg-ja">Welcome home, darling! How was your day?</div>
          </div>
        </div>

        <div class="typing" id="typing">
          <span></span><span></span><span></span>
        </div>

        <div class="audio-bar" id="audio-bar">
          <div class="audio-wave">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <span>Nagisa is speaking…</span>
        </div>

        <div class="image-preview" id="image-preview">
          <img id="preview-img" src="" alt="preview" />
          <button class="image-preview-remove" id="preview-remove">
            ✕ remove
          </button>
        </div>

        <div class="input-area">
          <div class="input-row">
            <button class="btn btn-img" id="img-btn" title="Upload image">
              🖼️
            </button>
            <textarea
              class="text-input"
              id="text-input"
              placeholder="Talk to Nagisa…"
              rows="1"
            ></textarea>
            <button class="btn btn-send" id="send-btn">➤</button>
          </div>
          <button class="btn btn-reset" id="reset-btn">
            Reset conversation
          </button>
        </div>

        <input type="file" id="file-input" accept="image/*" />
      </div>
    </div>

    <audio id="tts-audio" style="display: none"></audio>

    <!-- Remove ALL existing script tags and replace with these -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@5.3.12/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.3.1/dist/cubism4.min.js"></script>

    <script>
      // ── Config ──────────────────────────────────────────────────
      const API_BASE = "";
      const MODEL_PATH = "./frontend/model/majo/majo.model3.json";

      // ── State ───────────────────────────────────────────────────
      let currentModel = null;
      let pendingImage = null; // File object
      let isLoading = false;
      let lipSyncInterval = null;
      let audioCtx = null;
      let audioSrc = null;
      let analyser = null;

      // ── Live2D Setup ────────────────────────────────────────────
      const { Live2DModel } = PIXI.live2d;

      const stage = document.querySelector(".stage");
      const app = new PIXI.Application({
        view: document.getElementById("live2d-canvas"),
        autoStart: true,
        width: stage.offsetWidth,
        height: stage.offsetHeight,
        transparent: true, // ← key for Pixi v5
        antialias: true,
      });
      app.renderer.on("resize", () => {
        // block resize events completely
        app.renderer.resize(stage.offsetWidth, stage.offsetHeight);
      });
      async function loadModel() {
        setLoadingProgress(20);
        try {
          console.log("Loading model from:", MODEL_PATH);

          const model = await Live2DModel.from(MODEL_PATH, {
            autoInteract: false,
            onLoad: () => console.log("Model loaded!"),
            onError: (e) => console.error("Model error:", e),
          });

          console.log("Model object:", model); // ← check if this prints
          console.log("Internal model:", model.internalModel);

          setLoadingProgress(70);
          app.stage.addChild(model);

          // Wait for first render before scaling
          await new Promise((resolve) => requestAnimationFrame(resolve));

          const stageW = app.screen.width;
          const stageH = app.screen.height;

          const modelW = model.internalModel?.originalWidth || model.width;
          const modelH = model.internalModel?.originalHeight || model.height;

          console.log("Stage:", stageW, stageH);
          console.log("Model dimensions:", modelW, modelH);

          const scale = Math.min(stageW / modelW, stageH / modelH) * 0.75; // ← reduce from 0.9 to 0.75
          model.scale.set(scale);
          model.anchor.set(0.5, 0.5);
          model.x = stageW / 2;
          model.y = stageH / 2 + stageH * 0.05; // ← shift slightly up
          // Enable auto eye blink
          // model.internalModel.eyeBlink = false;

          // Start idle motion
          model.motion("Idle", 0, MotionPriority.IDLE);

          currentModel = model;
          window.__nagisa = currentModel;

          document
            .querySelector(".stage")
            .addEventListener("mousemove", (e) => {
              if (!currentModel) return;
              const rect = document
                .querySelector(".stage")
                .getBoundingClientRect();
              const x = ((e.clientX - rect.left) / rect.width) * 2 - 1; // -1 to 1
              const y = ((e.clientY - rect.top) / rect.height) * 2 - 1; // -1 to 1
              try {
                currentModel.internalModel.coreModel.setParameterValueById(
                  "ParamAngleX",
                  x * 30,
                );
                currentModel.internalModel.coreModel.setParameterValueById(
                  "ParamAngleY",
                  -y * 30,
                );
                currentModel.internalModel.coreModel.setParameterValueById(
                  "ParamBodyAngleX",
                  x * 10,
                );
              } catch (e) {}
            });
          document.getElementById("live2d-canvas").addEventListener(
            "webglcontextlost",
            (e) => {
              console.error("WebGL context lost!", e);
              e.preventDefault();
            },
            false,
          );

          document.getElementById("live2d-canvas").addEventListener(
            "webglcontextrestored",
            () => {
              console.log("WebGL context restored");
              loadModel(); // reload model on restore
            },
            false,
          );
          setLoadingProgress(100);
          setTimeout(() => {
            document.getElementById("loading").classList.add("hidden");
          }, 500);
        } catch (err) {
          console.error("Failed to load Live2D model:", err);
          document.querySelector(".loading-sub").textContent =
            "⚠ Model load failed. Check console & model path.";
        }
      }

      function setLoadingProgress(pct) {
        document.getElementById("loading-fill").style.width = pct + "%";
      }

      const MotionPriority = { IDLE: 1, NORMAL: 2, FORCE: 3 };

      // Resize handler
      // REMOVE this entire block from index.html:
      window.addEventListener("resize", () => {
        if (!currentModel) return;
        const stageW = app.renderer.width;
        const stageH = app.renderer.height;
        const scale =
          Math.min(
            stageW / (currentModel.width / currentModel.scale.x),
            stageH / (currentModel.height / currentModel.scale.y),
          ) * 0.85;
        currentModel.scale.set(scale);
        currentModel.x = stageW / 2;
        currentModel.y = stageH / 2 + stageH * 0.05;
      });

      // ── Expression Control ───────────────────────────────────────
      function setExpression(emotion) {
        document.getElementById("emotion-badge").textContent = emotion;
        if (!currentModel) return;
        try {
          currentModel.expression(emotion);
        } catch (e) {
          console.warn("Expression not found:", emotion);
        }
      }

      // ── Lip Sync ─────────────────────────────────────────────────
      function startLipSync(audioEl) {
        if (!currentModel) return;
        // Create context only once
        if (!audioCtx) {
          audioCtx = new AudioContext();
          audioSrc = audioCtx.createMediaElementSource(audioEl);
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 256;
          audioSrc.connect(analyser);
          analyser.connect(audioCtx.destination);
        }

        // Resume context if suspended (browser autoplay policy)
        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }

        const data = new Uint8Array(analyser.frequencyBinCount);

        function tick() {
          console.log("tick running, paused:", audioEl.paused);
          if (audioEl.paused || audioEl.ended) {
            setMouth(0);
            return;
          }
          analyser.getByteFrequencyData(data);
          const avg = data.slice(0, 8).reduce((a, b) => a + b, 0) / 8;
          console.log("Audio avg:", avg); // ← add this temporarily
          setMouth(Math.min(avg / 80, 1));
          requestAnimationFrame(tick);
        }
        tick();
      }

      function setMouth(value) {
        if (!currentModel) return;
        try {
          const clamped = Math.max(0, Math.min(1, value));
          currentModel.internalModel.coreModel.setParameterValueById(
            "ParamMouthOpenY",
            clamped,
          );
          // also try setting mouth form to open shape
          currentModel.internalModel.coreModel.setParameterValueById(
            "ParamMouthForm",
            0,
          );
          console.log("Mouth value:", value);
          console.log(currentModel.internalModel.coreModel._parameterIds);
        } catch (e) {
          console.error("Mouth error:", e);
        }
      }

      // ── Audio Playback ────────────────────────────────────────────
      function playAudio(base64Wav, onEnd) {
        const audioEl = document.getElementById("tts-audio");
        const audioBar = document.getElementById("audio-bar");

        audioEl.src = "data:audio/wav;base64," + base64Wav;
        audioEl.load();
        audioBar.classList.add("visible");

        audioEl.oncanplaythrough = async () => {
          // Resume context BEFORE playing
          if (audioCtx && audioCtx.state === "suspended") {
            await audioCtx.resume();
          }

          try {
            await audioEl.play(); // ← wait for play to actually start
            startLipSync(audioEl); // ← THEN start lip sync
          } catch (e) {
            console.warn("Autoplay blocked:", e);
            audioBar.classList.remove("visible");
            if (onEnd) onEnd();
          }
        };

        audioEl.onended = () => {
          audioBar.classList.remove("visible");
          setMouth(0);
          if (onEnd) onEnd();
        };
      }
      // ── Chat UI ───────────────────────────────────────────────────
      function appendMessage(role, enText, jaText) {
        const msgs = document.getElementById("messages");

        const div = document.createElement("div");
        div.className = "msg " + (role === "user" ? "user" : "bot");

        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        bubble.textContent = enText;
        div.appendChild(bubble);

        if (jaText && role === "bot") {
          const ja = document.createElement("div");
          ja.className = "msg-ja";
          ja.textContent = jaText.replace(/\[JA\]/g, "").trim();
          div.appendChild(ja);
        }

        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function setTyping(visible) {
        document.getElementById("typing").classList.toggle("visible", visible);
        const msgs = document.getElementById("messages");
        msgs.scrollTop = msgs.scrollHeight;
      }

      // ── Send Message ──────────────────────────────────────────────
      async function sendMessage() {
        if (isLoading) return;

        const input = document.getElementById("text-input");
        const text = input.value.trim();
        if (!text && !pendingImage) return;

        isLoading = true;
        document.getElementById("send-btn").disabled = true;

        // Show user message
        appendMessage("user", text + (pendingImage ? " 🖼️" : ""), null);
        input.value = "";
        input.style.height = "auto";

        // Clear image preview
        const imgFile = pendingImage;
        pendingImage = null;
        document.getElementById("image-preview").classList.remove("visible");

        setTyping(true);

        try {
          const form = new FormData();
          form.append("text", text);
          if (imgFile) form.append("image", imgFile);

          const res = await fetch(API_BASE + "/chat", {
            method: "POST",
            body: form,
          });
          const data = await res.json();

          setTyping(false);
          setExpression(data.emotion || "neutral");
          appendMessage("bot", data.en, data.ja);

          if (data.audio) {
            playAudio(data.audio);
          }
        } catch (err) {
          setTyping(false);
          appendMessage(
            "bot",
            "⚠ Could not reach the server. Is the backend running?",
            null,
          );
          console.error(err);
        } finally {
          isLoading = false;
          document.getElementById("send-btn").disabled = false;
        }
      }

      // ── Reset ─────────────────────────────────────────────────────
      async function resetChat() {
        try {
          await fetch(API_BASE + "/reset", { method: "POST" });
        } catch (e) {}
        document.getElementById("messages").innerHTML = `
        <div class="msg bot">
          <div class="msg-bubble">おかえり、ダーリン！今日はどうだった？</div>
          <div class="msg-ja">Welcome home, darling! How was your day?</div>
        </div>`;
        setExpression("neutral");
      }

      // ── Event Listeners ───────────────────────────────────────────
      document
        .getElementById("send-btn")
        .addEventListener("click", sendMessage);

      document.getElementById("text-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Auto-resize textarea
      document
        .getElementById("text-input")
        .addEventListener("input", function () {
          this.style.height = "auto";
          this.style.height = Math.min(this.scrollHeight, 100) + "px";
        });

      document.getElementById("reset-btn").addEventListener("click", resetChat);

      // Image upload
      document.getElementById("img-btn").addEventListener("click", () => {
        document.getElementById("file-input").click();
      });

      document.getElementById("file-input").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        pendingImage = file;

        const reader = new FileReader();
        reader.onload = (ev) => {
          document.getElementById("preview-img").src = ev.target.result;
          document.getElementById("image-preview").classList.add("visible");
        };
        reader.readAsDataURL(file);
        e.target.value = "";
      });

      document
        .getElementById("preview-remove")
        .addEventListener("click", () => {
          pendingImage = null;
          document.getElementById("image-preview").classList.remove("visible");
        });

      // ── Boot ──────────────────────────────────────────────────────
      loadModel();
    </script>
  </body>
</html>
